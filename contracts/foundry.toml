[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
bytecode_hash = "none"
use_literal_content = true

fs_permissions = [
    { access = "read-write", path = "../deployments" }
]

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
monad_mainnet_fork = "https://rpc.monad.xyz"

[etherscan]
monad = { key = "${MONADSCAN_API_KEY}", url = "https://api.monadscan.com/api", chain = 143 }
